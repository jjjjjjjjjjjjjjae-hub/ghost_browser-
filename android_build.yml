name: Build Android APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies
        run: npm install

      - name: Build Web Assets
        run: npm run build --if-present

      - name: Capacitor Sync
        run: npx cap sync android

      - name: Ultimate Cordova Fix
        run: |
          # 1. Жетіспейтін папка мен файлды қолмен құру
          mkdir -p android/capacitor-cordova-android-plugins
          echo "ext { }" > android/capacitor-cordova-android-plugins/cordova.variables.gradle
          
          # 2. Егер файл бәрібір танылмаса, Gradle ішінен оны шақыруды өшіру (sed арқылы)
          if [ -f "android/app/capacitor.build.gradle" ]; then
            sed -i '/cordova.variables.gradle/d' android/app/capacitor.build.gradle
          fi
          echo "✅ Cordova path fix applied."

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

