name: Build APK
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install
      - name: Build Web Assets
        run: |
          # Егер build скрипті болмаса, қате бермеуі үшін
          npm run build || mkdir -p www
      - name: Hard Patch Gradle & Build
        run: |
          mkdir -p android/capacitor-cordova-android-plugins/
          touch android/capacitor-cordova-android-plugins/cordova.variables.gradle
          # Gradle Property-ді күштеп енгізу
          echo "ext { cdvPluginPostBuildExtras = [] }" >> android/build.gradle
          cd android && chmod +x gradlew
          # -x lint: Тексерістерді өшіріп, тікелей жинау
          ./gradlew assembleDebug -x lint --stacktrace
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
