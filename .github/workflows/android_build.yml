name: Build APK
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install
      - name: Build and Sync Capacitor
        run: |
          # 1. Ескі және қате папканы түбімен өшіру
          rm -rf android
          # 2. Таза Android проектін серверде нөлден құру
          npx cap add android
          npx cap sync android
      - name: Hard Patch and Assemble
        run: |
          cd android
          # Cordova қалдықтарын тазалау
          sed -i '/apply from:.*cordova/d' app/build.gradle || true
          # Gradle құқығын беру және жинау
          chmod +x gradlew
          ./gradlew assembleDebug -x lint
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Ghost-v2-Final-Release
          path: android/app/build/outputs/apk/debug/app-debug.apk
