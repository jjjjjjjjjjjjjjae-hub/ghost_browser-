name: Build APK
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install
      - name: Fix Capacitor & Build
        run: |
          # 1. Capacitor-дың негізгі байланыстарын қалпына келтіру
          cd android
          echo "include ':app'" > settings.gradle
          echo "project(':capacitor-android').projectDir = new File('../node_modules/@capacitor/android/capacitor')" >> settings.gradle
          echo "include ':capacitor-android'" >> settings.gradle
          
          # 2. Cordova-ны өшіру, бірақ Capacitor-ға тиіспеу
          sed -i '/apply from:.*cordova/d' app/build.gradle
          sed -i '/project(":capacitor-cordova-android-plugins")/d' app/build.gradle
          
          # 3. Билдті бастау
          chmod +x gradlew
          ./gradlew assembleDebug -x lint
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Ghost-v2-Final
          path: android/app/build/outputs/apk/debug/app-debug.apk
