name: Build Android APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Install dependencies
        run: npm install
      - name: Capacitor Sync
        run: npx cap sync android
      - name: Clean and Fix Gradle
        run: |
          cd android
          # Қате шығарып жатқан файлдарды тазалап, бос файлдармен алмастыру
          mkdir -p capacitor-cordova-android-plugins
          echo "ext { }" > capacitor-cordova-android-plugins/cordova.variables.gradle
          # Негізгі файлдағы қате жолды өшіру
          sed -i '/cordova.variables.gradle/d' app/capacitor.build.gradle || true
          chmod +x gradlew
      - name: Build with Gradle
        run: |
          cd android
          ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
