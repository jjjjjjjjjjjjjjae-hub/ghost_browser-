name: Build APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Pure Capacitor Build
        run: |
          # Cordova тәуелділігін Gradle-дан күштеп алып тастау
          sed -i '/apply from: ".*cordova.variables.gradle"/d' android/app/build.gradle
          sed -i '/implementation project(":capacitor-cordova-android-plugins")/d' android/app/build.gradle
          sed -i '/include ":capacitor-cordova-android-plugins"/d' android/settings.gradle
          
          # Төтенше жағдай үшін бос файлдар жасау
          mkdir -p android/capacitor-cordova-android-plugins/
          touch android/capacitor-cordova-android-plugins/cordova.variables.gradle
          
          # Билдті бастау
          cd android && chmod +x gradlew && ./gradlew assembleDebug

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ghost-v2-Release
          path: android/app/build/outputs/apk/debug/app-debug.apk
