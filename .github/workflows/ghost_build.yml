name: Ghost Final Build
on: [push]

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Project Deps
        run: npm install

      - name: Build and Sync Capacitor
        run: |
          npx cap sync android
          
      - name: Force Clean Cordova & Build
        run: |
          cd android
          # Cordova-ның барлық қалдықтарын күштеп алып тастау
          sed -i '/:capacitor-cordova-android-plugins/d' settings.gradle
          sed -i '/capacitor-cordova-android-plugins/d' app/build.gradle
          
          # Gradle құқығын беру және жинау
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Export APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ghost-v2-Final
          path: android/app/build/outputs/apk/debug/app-debug.apk
